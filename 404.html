<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found | Nosh Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Young+Serif&family=Nothing+You+Could+Do&family=Outfit:wght@400;700&family=Big+Shoulders+Text:wght@700&display=swap" rel="stylesheet">
<style>
:root{--orange:#E89A3C;--ink:#1F2937;--cream:#FFF4E0;--green:#25D366;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);font-family:'Outfit',sans-serif;color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.num{font-family:'Erica One',serif;font-size:12rem;line-height:1;color:var(--orange);opacity:.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.content{position:relative;z-index:2;}
.hand{font-family:'Nothing You Could Do',cursive;font-size:2rem;color:var(--orange);margin-bottom:16px;transform:rotate(-1.5deg);display:block;}
h1{font-family:'Erica One',serif;font-size:3.5rem;color:var(--cream);line-height:.96;margin-bottom:16px;}
p{font-family:'Young Serif',serif;font-style:italic;font-size:1.1rem;color:rgba(255,244,224,.65);margin-bottom:40px;max-width:480px;line-height:1.6;}
.btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.btn-home{background:var(--orange);color:var(--ink);padding:14px 32px;border:3px solid var(--cream);font-family:'Big Shoulders Text',sans-serif;font-size:.75rem;letter-spacing:.18em;text-decoration:none;}
.btn-wa{background:var(--green);color:var(--ink);padding:14px 32px;border:3px solid var(--cream);font-family:'Big Shoulders Text',sans-serif;font-size:.75rem;letter-spacing:.18em;text-decoration:none;}
</style>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<div class="num">404</div>
<div class="content">
  <span class="hand">oops — this page is still a mystery.</span>
  <h1>Page Not Found.</h1>
  <p>Looks like this page is one surprise we didn't plan. But your unscripted luxury escape is right around the corner.</p>
  <div class="btns">
    <a href="/" class="btn-home">← Back to Home</a>
    <a href="https://wa.me/919567632255" class="btn-wa">💬 Start on WhatsApp</a>
  </div>
</div>
<script>
(function(){
  var ham=document.getElementById('navHam');
  var nav=document.querySelector('.nav-links');
  if(!ham||!nav)return;
  ham.addEventListener('click',function(){
    var open=nav.classList.toggle('open');
    ham.classList.toggle('open',open);
    ham.setAttribute('aria-expanded',open);
    document.body.style.overflow=open?'hidden':'';
  });
  // Close on link click
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(){
      nav.classList.remove('open');
      ham.classList.remove('open');
      ham.setAttribute('aria-expanded','false');
      document.body.style.overflow='';
    });
  });
})();
</script>
<!-- Sticky WhatsApp — mobile only -->
<a href="https://wa.me/919567632255?text=Hi%20Nosh%20Tours%2C%20I%27d%20like%20to%20plan%20a%20trip" 
   class="sticky-wa" target="_blank" rel="noopener">
  💬 &nbsp;Book via WhatsApp
</a>
</body>
</html>
