<style>
:root{--orange:#E89A3C;--ink:#1F2937;--cream:#FFF4E0;--green:#25D366;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);font-family:'Outfit',sans-serif;color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.num{font-family:'Erica One',serif;font-size:12rem;line-height:1;color:var(--orange);opacity:.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}

.btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}

.btn-wa{background:var(--green);color:var(--ink);padding:14px 32px;border:3px solid var(--cream);font-family:'Big Shoulders Text',sans-serif;font-size:.75rem;letter-spacing:.18em;text-decoration:none;}

/* --- NOSH AGENT TYPE OVERHAUL --- */
@media(max-width:768px) {
  body { font-size: 120% !important; }

  .nav-links { display:none; flex-direction:column; position:absolute; top:80px; left:0; right:0; background:rgba(255,255,255,0.98); padding:24px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.15); text-align:center; gap:20px;}
  .nav-links.active { display:flex; }
}


/* ANTIGRAVITY UI/UX OVERRIDES */
/* 1. Kill Broken GSAP/ScrollReveal - Force 100% Visibility */
.reveal, .hidden, [style*="opacity: 0"], .hidden-section, .dest-card {
    opacity: 1 !important;
    transform: none !important;
    visibility: visible !important;
}
/* 2. About Page Portrait Fixes */
.founder-img, .team-image {

}

.empty-space-fix { display: none !important; }
/* 4. Global Mobile Flow Alignments */
@media(max-width:768px) {
    .section, .hero { padding-left: 15px !important; padding-right: 15px !important; }
    img { border-radius: 12px !important; }
    .footer-grid { text-align: left !important; }
}


/* --- ANTIGRAVITY PHASE 1 UI/UX OVERRIDES --- */
/* 1. Nuke Broken GSAP Animations */
.reveal, .hidden, [style*="opacity: 0"], .hidden-section, .dest-card, .canvas-card {
    opacity: 1 !important; transform: none !important; visibility: visible !important; display: block !important;

/* 2. Fix Founder Portraits */
.founder-img, .team-image { object-position: top center !important; object-fit: cover !important; }

.wellness-hero-overlay { padding-bottom: 20px !important; }

/* 4. Split Video Slider Layout */
.hero-video-slider { display: flex; align-items: center; background: #1C2B3A; height: 100vh; width: 100%; overflow: hidden; position: relative; }
.hero-text-side { width: 50%; padding: 0 5vw; z-index: 10; position: relative; }
.slider-text-group { position: absolute; top: 50%; transform: translateY(-50%); opacity: 0; visibility: hidden; transition: opacity 1s ease-in-out, visibility 1s ease-in-out; width: 80%; }
.slider-text-group.active { opacity: 1; visibility: visible; position: relative; transform: translateY(0); }
.hero-video-side { width: 50%; display: flex; justify-content: center; align-items: center; height: 100%; position: relative; }
.slider-video { position: absolute; height: 85vh; width: auto; aspect-ratio: 9/16; border-radius: 24px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: opacity 1.2s ease-in-out; }
.slider-video.active { opacity: 1; visibility: visible; }
.hero-cta-fixed { position: relative; z-index: 20; margin-top: 30px; }
/* Global Mobile Alignments */
@media(max-width:768px) {
    .hero-video-slider { flex-direction: column; height: auto; padding-top: 120px; padding-bottom: 40px; }
    .hero-text-side { width: 100%; text-align: center; padding: 0 20px 20px; min-height: 250px; }

    .section, .hero { padding-left: 15px !important; padding-right: 15px !important; }

<script>
(function(){
  var ham=document.getElementById('navHam');
  var nav=document.querySelector('.nav-links');
  if(!ham||!nav)return;
  ham.addEventListener('click',function(){
    var open=nav.classList.toggle('open');
    ham.classList.toggle('open',open);
    ham.setAttribute('aria-expanded',open);
    document.body.style.overflow=open?'hidden':'';
  });
  // Close on link click
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(){
      nav.classList.remove('open');
      ham.classList.remove('open');
      ham.setAttribute('aria-expanded','false');
      document.body.style.overflow='';
    });
  });
})();
</script>

<a href="https://wa.me/919567632255?text=Hi%20Nosh%20Tours%2C%20I%27d%20like%20to%20plan%20a%20trip" 
   class="sticky-wa" target="_blank" rel="noopener">
  💬 &nbsp;Book via WhatsApp
</a>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => { 
      if(entry.isIntersecting) {
        entry.target.classList.add('visible'); 
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'none';
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -10px 0px' });
  document.querySelectorAll('.reveal, section, .dest-card, .diff-left').forEach(element => {
    scrollObserver.observe(element);
  });
});
</script>
