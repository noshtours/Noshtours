<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosh Tours — You've Been Putting Yourself Last Long Enough</title>
<meta name="description" content="Nosh Tours crafts all-inclusive, fixed-price unscripted journeys across India and beyond. Built block by block around you. No hidden charges. 50+ Nosh Brains.">
<link rel="canonical" href="https://noshtours.com/">
<meta property="og:title" content="Nosh Tours — Unscripted Luxury Travel">
<meta property="og:description" content="Build the trip you actually want. One fixed price. 50+ specialists. Zero drama.">
<meta property="og:image" content="https://noshtours.com/images/hero-india.jpg">
<meta property="og:url" content="https://noshtours.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Baloo+2:wght@500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="/images/hero-india.jpg">
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:var(--fh);}
.section-eyebrow,.eyebrow,.step-label,.badge-txt{font-family:var(--fz);}
body{background:var(--cream);font-family:'Barlow',sans-serif;background:#FDF6EC;color:#1C2B3A;overflow-x:hidden;line-height:1.5}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}
:root{
  --fh:'Fredoka',sans-serif;
  --fz:'Baloo 2',sans-serif;
  --cream:#FAF0E4;
  --sep-h:12px;

  --orange:#E8951A;--navy:#1C2B3A;--cream:#FDF6EC;
  --gold:#C4962A;--charcoal:#2C2C2C;
  --ff-display:'Erica One',serif;
  --ff-ui:'Outfit',sans-serif;
  --ff-cond:'Barlow Condensed',sans-serif;
  --ff-body:'Barlow',sans-serif;
}

/* ── NAV ─────────────────────────────────────────── */
.nav{position:sticky;top:0;z-index:1000;background:#1C2B3A;border-bottom:2px solid #E8951A;height:60px;display:flex;align-items:center;padding:0 24px}
.nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-logo{width:34px;height:34px;object-fit:contain}
.nav-wordmark{font-family:'Barlow Condensed',sans-serif;font-family:var(--ff-cond);font-weight:800;font-size:1.05rem;letter-spacing:.2em;color:#FDF6EC;text-transform:uppercase}
.nav-wordmark em{color:#E8951A;font-style:normal}
.nav-links{display:flex;align-items:center;margin-left:auto}
.nav-links a{font-family:var(--ff-cond);font-weight:600;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(253,246,236,.78);padding:0 12px;height:60px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:#E8951A;border-bottom-color:#E8951A}
.nav-wa{margin-left:10px;background:#E8951A;color:#1C2B3A !important;font-weight:800 !important;border-radius:4px;padding:0 14px !important;height:36px !important;border-bottom:none !important;font-size:.7rem !important}
.nav-wa:hover{background:#C4962A !important;color:#fff !important}
.nav-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;margin-left:auto}
.nav-ham span{display:block;width:24px;height:2px;background:#FDF6EC;border-radius:2px;transition:transform .25s,opacity .25s}
.nav-ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-ham.open span:nth-child(2){opacity:0}
.nav-ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ── HERO ─────────────────────────────────────────── */
.hero{min-height:100svh;position:relative;overflow:hidden;display:flex;align-items:center;padding:80px 64px}
.hero-bg{position:absolute;inset:0;background-image:url('/images/hero-india.jpg'),linear-gradient(135deg,#1C2B3A 0%,#2C4A63 100%);background-color:#1C2B3A;background-size:cover;background-position:center 40%}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,rgba(28,43,58,.88) 0%,rgba(28,43,58,.65) 50%,rgba(28,43,58,.2) 100%)}
.hero-inner{position:relative;z-index:1;max-width:680px}
.hero-eyebrow{font-family:var(--ff-cond);font-weight:600;font-size:.76rem;letter-spacing:.28em;text-transform:uppercase;color:#E8951A;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:#E8951A}
.hero-title{font-family:var(--ff-display);font-size:clamp(2.8rem,7.5vw,5.8rem);line-height:.95;color:#FDF6EC;margin-bottom:24px;letter-spacing:-.01em}
.hero-title .accent{color:#E8951A}
.hero-sub{font-size:clamp(1rem,2.2vw,1.15rem);color:rgba(253,246,236,.75);line-height:1.75;max-width:520px;margin-bottom:40px}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap}
.btn-p{font-family:var(--ff-ui);font-weight:700;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;background:#E8951A;color:#1C2B3A;padding:16px 30px;border-radius:4px;display:inline-flex;align-items:center;gap:8px;min-height:52px;transition:background .2s,transform .15s}
.btn-p:hover{background:#C4962A;transform:translateY(-2px)}
.btn-g{font-family:var(--ff-ui);font-weight:600;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;border:1.5px solid rgba(253,246,236,.3);color:rgba(253,246,236,.85);padding:16px 30px;border-radius:4px;display:inline-flex;align-items:center;gap:8px;min-height:52px;transition:border-color .2s,color .2s}
.btn-g:hover{border-color:#E8951A;color:#E8951A}
.hero-badges{margin-top:48px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{font-family:var(--ff-cond);font-weight:600;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(253,246,236,.5);padding:6px 12px;border:1px solid rgba(253,246,236,.15);border-radius:100px}
.badge strong{color:#E8951A}

/* ── SOCIAL PROOF TABS (replaces stats) ───────────── */
.sp-strip{background:#1C2B3A;border-bottom:1px solid rgba(232,149,26,.2);padding:0 64px}
.sp-inner{display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sp-inner::-webkit-scrollbar{display:none}
.sp-tab{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:16px 20px;font-family:var(--ff-cond);font-weight:600;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(253,246,236,.5);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.sp-tab:hover{color:#E8951A;border-bottom-color:#E8951A}
.sp-tab .sp-icon{font-size:1rem;flex-shrink:0}
.sp-divider{width:1px;background:rgba(253,246,236,.08);margin:10px 0;flex-shrink:0}

/* ── SHARED SECTION STYLES ───────────────────────── */
.eyebrow{font-family:var(--fz);font-family:var(--ff-cond);font-weight:600;font-size:.75rem;letter-spacing:.28em;text-transform:uppercase;color:#E8951A;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';width:24px;height:1px;background:#E8951A}
.sec-title{font-family:var(--ff-display);font-size:clamp(1.9rem,4.5vw,3.4rem);line-height:1;letter-spacing:-.01em;margin-bottom:12px}
.sec-sub{font-size:1rem;color:rgba(28,43,58,.6);max-width:540px;line-height:1.75;margin-bottom:40px}
.btn-d{font-family:var(--ff-ui);font-weight:800;font-size:.9rem;letter-spacing:.06em;text-transform:uppercase;background:#1C2B3A;color:#FDF6EC;padding:18px 36px;border-radius:4px;display:inline-flex;align-items:center;gap:10px;min-height:56px;transition:background .2s,transform .15s}
.btn-d:hover{background:#243447;transform:translateY(-2px)}

/* ── INDIA SECTION ────────────────────────────────── */
.india-sec{padding:96px 64px;background:#FDF6EC}
.canvas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:40px}
.canvas-card{border-radius:10px;overflow:hidden;position:relative;height:340px;cursor:pointer;transition:transform .3s,box-shadow .3s}
.canvas-card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(28,43,58,.18)}
.canvas-photo{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s}
.canvas-card:hover .canvas-photo{transform:scale(1.05)}
.canvas-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(28,43,58,.9) 0%,rgba(28,43,58,.15) 50%,transparent 100%)}
.canvas-info{position:absolute;bottom:0;left:0;right:0;padding:22px 20px;z-index:2}
.canvas-tag{font-family:var(--ff-cond);font-weight:600;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:#E8951A;margin-bottom:4px}
.canvas-name{font-family:var(--ff-display);font-size:1.65rem;color:#FDF6EC;line-height:1;margin-bottom:6px}
.canvas-sub{font-size:.78rem;color:rgba(253,246,236,.65);margin-bottom:12px}
.canvas-cta{font-family:var(--ff-cond);font-weight:700;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#E8951A;display:inline-flex;align-items:center;gap:6px}
.canvas-cta::after{content:'→';transition:transform .2s}
.canvas-card:hover .canvas-cta::after{transform:translateX(4px)}

/* ── INTERNATIONAL SECTION ────────────────────────── */
.intl-sec{padding:96px 64px;background:#1C2B3A}
.intl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:40px}
.intl-card{border-radius:10px;overflow:hidden;position:relative;height:340px;cursor:pointer;transition:transform .3s,box-shadow .3s}
.intl-card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.intl-photo{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s}
.intl-card:hover .intl-photo{transform:scale(1.05)}
.intl-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(28,43,58,.92) 0%,rgba(28,43,58,.1) 55%,transparent 100%)}
/* International CSS gradients (swaps to real photos on /images/ deploy) */
.d-bali .intl-photo{background:linear-gradient(160deg,#2d6b2a,#4a9a3a 35%,#7ab850 55%,#c8a030 75%,#1a5a2a)}
.d-maldives .intl-photo{background:linear-gradient(180deg,#1a5a8a,#0b7ea3 25%,#3ab8d8 50%,#80d8e8 65%,#f5f0e8 80%,#e8d8c0)}
.d-thailand .intl-photo{background:linear-gradient(170deg,#e85a2a,#e8951a 30%,#f0c060 55%,#50a8d0 70%,#1a5a8a)}
.d-vietnam .intl-photo{background:linear-gradient(160deg,#1a6b5a,#2a8a6a 30%,#5aaa8a 55%,#3a7a9a 75%,#0a4a6a)}
.d-srilanka .intl-photo{background:linear-gradient(170deg,#b84a1c,#d87840 30%,#e8b060 55%,#4a8a3a 70%,#2a5a2a)}
.d-uzbekistan .intl-photo{background:linear-gradient(160deg,#1a3a7a,#c4962a 30%,#e8b830 55%,#1a5a9a 70%,#0a2a5a)}
.intl-info{position:absolute;bottom:0;left:0;right:0;padding:20px;z-index:2}
.intl-region{font-family:var(--ff-cond);font-weight:600;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:#E8951A;margin-bottom:3px}
.intl-name{font-family:var(--ff-display);font-size:1.65rem;color:#FDF6EC;line-height:1;margin-bottom:6px}
.intl-tag{font-size:.78rem;color:rgba(253,246,236,.62);margin-bottom:10px}
.intl-price{font-family:var(--ff-cond);font-weight:700;font-size:.75rem;letter-spacing:.08em;color:rgba(253,246,236,.7)}
.intl-price span{color:#E8951A;font-size:.95rem}

/* ── COMPARISON TABLE ─────────────────────────────── */
.compare-sec{padding:80px 64px;background:#fff}
.compare-table{width:100%;border-collapse:collapse;margin-top:48px;border-radius:10px;overflow:hidden}
.compare-table th{padding:16px 24px;font-family:var(--ff-cond);font-weight:700;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase}
.compare-table th:first-child{background:rgba(28,43,58,.06);color:rgba(28,43,58,.5);text-align:left;width:50%}
.compare-table th:last-child{background:#E8951A;color:#1C2B3A;text-align:left;width:50%}
.compare-table td{padding:16px 24px;font-size:.95rem;line-height:1.55;border-bottom:1px solid rgba(28,43,58,.06)}
.compare-table td:first-child{background:rgba(28,43,58,.02);color:rgba(28,43,58,.55)}
.compare-table td:last-child{background:rgba(232,149,26,.04);color:#1C2B3A;font-weight:600}
.compare-table td:last-child::before{content:'✓  ';color:#E8951A;font-weight:700}
.compare-table tr:last-child td{border-bottom:none}

/* ── SOCIAL PROOF LINKS SECTION ───────────────────── */
.proof-sec{padding:60px 64px;background:#1C2B3A}
.proof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:40px}
.proof-card{background:rgba(253,246,236,.04);border:1px solid rgba(253,246,236,.1);border-radius:10px;padding:20px 18px;display:flex;flex-direction:column;gap:8px;transition:background .2s,border-color .2s,transform .2s}
.proof-card:hover{background:rgba(232,149,26,.08);border-color:rgba(232,149,26,.4);transform:translateY(-3px)}
.proof-card-icon{font-size:1.4rem}
.proof-card-label{font-family:var(--ff-cond);font-weight:700;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#E8951A}
.proof-card-desc{font-size:.82rem;color:rgba(253,246,236,.55);line-height:1.5;flex:1}
.proof-card-cta{font-family:var(--ff-cond);font-weight:600;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(253,246,236,.45);display:flex;align-items:center;gap:4px;margin-top:4px;transition:color .2s}
.proof-card:hover .proof-card-cta{color:#E8951A}

/* ── HOW IT WORKS ─────────────────────────────────── */
.hiw-sec{padding:96px 64px;background:#FDF6EC}
.hiw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:48px}
.hiw-card{background:#fff;border-radius:10px;padding:36px 28px;border:1px solid rgba(28,43,58,.07);position:relative;transition:box-shadow .3s,transform .3s}
.hiw-card:hover{box-shadow:0 12px 40px rgba(28,43,58,.1);transform:translateY(-3px)}
.hiw-num{font-family:var(--ff-display);font-size:4rem;color:rgba(232,149,26,.1);line-height:1;position:absolute;top:18px;right:18px}
.hiw-icon{width:48px;height:48px;background:#E8951A;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:20px}
.hiw-title{font-family:var(--ff-cond);font-weight:700;font-size:1.05rem;color:#1C2B3A;margin-bottom:10px;letter-spacing:.02em}
.hiw-desc{font-size:.9rem;color:rgba(28,43,58,.62);line-height:1.7}

/* ── GIFTING SECTION ──────────────────────────────── */
.gift-sec{padding:96px 64px;background:#1C2B3A;overflow:hidden}
.gift-inner{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;max-width:1100px;margin:0 auto}
.gift-img-wrap{position:relative;border-radius:12px;overflow:hidden}
.gift-img-wrap img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}
.gift-img-wrap::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,149,26,.15),transparent);z-index:1;border-radius:12px}
.gift-accent{display:inline-block;background:rgba(232,149,26,.12);border:1px solid rgba(232,149,26,.3);border-radius:100px;padding:8px 18px;font-family:var(--ff-cond);font-weight:600;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:#E8951A;margin-bottom:20px}
.gift-title{font-family:var(--ff-display);font-size:clamp(2rem,4vw,3rem);color:#FDF6EC;line-height:.96;margin-bottom:16px}
.gift-sub{color:rgba(253,246,236,.65);font-size:1rem;line-height:1.75;margin-bottom:36px}
.gift-pillars{display:flex;flex-direction:column;gap:16px;margin-bottom:36px}
.gift-pillar{display:flex;gap:14px;align-items:flex-start}
.gift-pillar-icon{width:36px;height:36px;background:rgba(232,149,26,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;margin-top:2px}
.gift-pillar-title{font-family:var(--ff-cond);font-weight:700;font-size:.88rem;letter-spacing:.04em;color:#FDF6EC;margin-bottom:3px}
.gift-pillar-desc{font-size:.85rem;color:rgba(253,246,236,.55);line-height:1.6}
.gift-founder-quote{border-left:2px solid #E8951A;padding-left:16px;margin-top:0}
.gift-founder-quote p{font-size:.88rem;font-style:italic;color:rgba(253,246,236,.6);line-height:1.65;margin-bottom:6px}
.gift-founder-quote cite{font-family:var(--ff-cond);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#E8951A}

/* ── REELS ────────────────────────────────────────── */
.reels-sec{padding:80px 0;background:#111820;overflow:hidden}
.reels-hd{padding:0 64px;margin-bottom:36px}
.reels-scroll{display:flex;gap:16px;overflow-x:auto;padding:4px 64px 20px;scroll-snap-type:x mandatory;scrollbar-width:thin;scrollbar-color:#E8951A rgba(253,246,236,.08);-webkit-overflow-scrolling:touch}
.reels-scroll::-webkit-scrollbar{height:4px}
.reels-scroll::-webkit-scrollbar-track{background:rgba(253,246,236,.05)}
.reels-scroll::-webkit-scrollbar-thumb{background:#E8951A;border-radius:2px}
.reel-slot{flex:0 0 220px;scroll-snap-align:start;border-radius:12px;overflow:hidden;background:rgba(253,246,236,.05);border:1px solid rgba(253,246,236,.08)}
.reel-embed{width:100%;height:390px;background:rgba(28,43,58,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.reel-ph-icon{font-size:1.8rem;opacity:.35}
.reel-ph-text{font-family:var(--ff-cond);font-size:.72rem;letter-spacing:.1em;color:rgba(253,246,236,.35);text-align:center;padding:0 14px}
.reel-iframe{width:100%;height:390px;border:none}
.reel-label{padding:12px 14px;font-family:var(--ff-cond);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(253,246,236,.4)}

/* ── NOSH BRAINS ──────────────────────────────────── */
.brains-sec{padding:80px 64px;background:linear-gradient(135deg,#1C2B3A 60%,#243447);position:relative;overflow:hidden}
.brains-sec::before{content:'50+';font-family:var(--ff-display);font-size:20rem;color:rgba(232,149,26,.04);position:absolute;right:-40px;top:50%;transform:translateY(-50%);line-height:1;pointer-events:none}
.brains-inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;max-width:1100px}
.brains-count{font-family:var(--ff-display);font-size:5rem;color:#E8951A;line-height:1;margin-bottom:6px}
.brains-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px}
.brain-pill{background:rgba(253,246,236,.05);border:1px solid rgba(232,149,26,.22);border-radius:100px;padding:7px 16px;font-family:var(--ff-cond);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(253,246,236,.65)}
.brains-right{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.brain-stat{background:rgba(253,246,236,.04);border:1px solid rgba(253,246,236,.07);border-radius:10px;padding:22px 18px}
.brain-stat-n{font-family:var(--ff-display);font-size:2.2rem;color:#E8951A;line-height:1;margin-bottom:4px}
.brain-stat-l{font-family:var(--ff-cond);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(253,246,236,.45)}

/* ── TESTIMONIALS ─────────────────────────────────── */
.testi-sec{padding:80px 64px;background:#fff}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
.testi-card{background:#FDF6EC;border-radius:10px;padding:28px 24px;border-left:3px solid #E8951A;transition:box-shadow .3s}
.testi-card:hover{box-shadow:0 8px 32px rgba(28,43,58,.1)}
.testi-stars{color:#E8951A;font-size:.95rem;margin-bottom:14px;letter-spacing:2px}
.testi-quote{font-size:.92rem;color:#1C2B3A;line-height:1.75;margin-bottom:18px;font-style:italic}
.testi-name{font-family:var(--ff-cond);font-weight:700;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:#1C2B3A}
.testi-dest{font-size:.76rem;color:#E8951A;margin-top:2px}

/* ── GOVERNMENT RECOGNITION ───────────────────────── */
.recog-sec{padding:80px 64px;background:#111820}
.recog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:40px;margin-bottom:48px}
.recog-card{background:rgba(253,246,236,.04);border:1px solid rgba(253,246,236,.08);border-radius:10px;overflow:hidden;transition:border-color .2s,transform .2s;padding:20px 18px}
